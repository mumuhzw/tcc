<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../login-principal/css/login.css">
    <title>Criar Conta - BioClicky</title>
</head>
<body>

<section class="cadastro-container">

    <a href="../index/index.html" class="logo">
        <img src="../../public/imagem/logo-header/logo-e-titulo.png" alt="BioClicky">
    </a>

    <form class="cadastro-form">

        <h1>Criar Conta</h1>

        <p>
            Preencha os dados abaixo para criar sua conta.
        </p>

        <label>Nome Completo</label>
        <input type="text" placeholder="Digite seu nome" required>

        <label>E-mail</label>
        <input type="email" placeholder="Digite seu e-mail" required>

        <label>Telefone</label>
        <input type="tel" placeholder="(11) 99999-9999" required>

        <label>Senha</label>
        <section class="campo-senha">
    <input type="password" id="senha" placeholder="Digite sua senha" required>
    <ion-icon name="eye-outline" id="iconeSenha"></ion-icon>
        </section>

        <label>Confirmar Senha</label>
        <section class="campo-senha">
    <input type="password" id="confirmarSenha" placeholder="Confirme sua senha" required>
    <ion-icon name="eye-outline" id="iconeConfirmar"></ion-icon>
        </section>

        <button type="submit">
            Criar Conta
        </button>

        <small>
            Já possui uma conta?
            <a href="../login-principal/login.html">Entrar</a>
        </small>

    </form>

</section>

<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

<script src="../login-principal/js/script.js"></script>
</body>
</html>
